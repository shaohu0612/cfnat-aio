<!DOCTYPE html>

    <title>CFNAT-AIO V2 — 地区管理</title>
    <style id="theme-vars">
/* CFNAT-AIO V2 Design System — Brand CSS */
/* Dark tech theme: deep navy + blue accent + green status */

/* === Brand Prefix Variables === */
:root {
  /* Primary Scale — Indigo Blue */
  --cfnat-primary: #58a6ff;
  --cfnat-primary-hover: #79b8ff;
  --cfnat-primary-pressed: #1f6feb;
  --cfnat-primary-foreground: #ffffff;

  /* Background & Surface */
  --cfnat-background: #0a0e14;
  --cfnat-foreground: #e6edf3;
  --cfnat-card: #12161e;
  --cfnat-card-foreground: #c9d1d9;
  --cfnat-popover: #1a1f2e;
  --cfnat-popover-foreground: #c9d1d9;

  /* Muted */
  --cfnat-muted: #161b22;
  --cfnat-muted-foreground: #6e7681;

  /* Border & Input */
  --cfnat-border: #1e2430;
  --cfnat-input: #0d1117;
  --cfnat-ring: #58a6ff;

  /* Radius */
  --cfnat-radius-sm: 4px;
  --cfnat-radius-md: 8px;
  --cfnat-radius-lg: 12px;
  --cfnat-radius-full: 9999px;

  /* State Colors */
  --state-success: #3fb950;
  --state-warning: #d29922;
  --state-error: #f85149;
  --state-info: #58a6ff;
}

/* === Typography === */
:root {
  --font-display: "SF Mono", "Cascadia Code", "Fira Code", "Consolas", monospace;
  --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-base: 14px;
  --font-size-lg: 16px;
  --font-size-xl: 20px;
  --font-size-2xl: 26px;
  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-bold: 700;
  --line-height-tight: 1.2;
  --line-height-normal: 1.5;
}

/* === Semantic Aliases (Tailwind-compatible) === */
:root {
  --color-primary: var(--cfnat-primary);
  --color-primary-hover: var(--cfnat-primary-hover);
  --color-primary-pressed: var(--cfnat-primary-pressed);
  --background: var(--cfnat-background);
  --foreground: var(--cfnat-foreground);
  --color-card: var(--cfnat-card);
  --color-card-foreground: var(--cfnat-card-foreground);
  --color-popover: var(--cfnat-popover);
  --color-popover-foreground: var(--cfnat-popover-foreground);
  --color-muted: var(--cfnat-muted);
  --color-muted-foreground: var(--cfnat-muted-foreground);
  --color-border: var(--cfnat-border);
  --color-input: var(--cfnat-input);
  --color-ring: var(--cfnat-ring);
  --radius-sm: var(--cfnat-radius-sm);
  --radius-md: var(--cfnat-radius-md);
  --radius-lg: var(--cfnat-radius-lg);
  --radius-full: var(--cfnat-radius-full);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>

<body>

  <!-- ====== 顶部导航栏 ====== -->
  <nav style="background:var(--cfnat-card);border-bottom:1px solid var(--cfnat-border);">
    <div style="max-width:1400px;margin:0 auto;padding:0 24px;display:flex;align-items:center;height:56px;gap:4px;">
      <!-- Logo / 品牌标识 -->
      <div style="font-family:var(--font-display);font-size:var(--font-size-lg);font-weight:var(--font-weight-bold);color:var(--cfnat-primary);margin-right:24px;white-space:nowrap;letter-spacing:1px;">
        CFNAT-AIO
      </div>
      <!-- 7个导航Tab -->
      <a data-dom-id="nav-dashboard" href="#" style="padding:8px 16px;border-radius:var(--cfnat-radius-md);color:var(--cfnat-muted-foreground);text-decoration:none;font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);transition:color 0.15s,background 0.15s;white-space:nowrap;">仪表盘</a>
      <a data-dom-id="nav-regions" href="#" style="padding:8px 16px;border-radius:var(--cfnat-radius-md);color:var(--cfnat-primary);text-decoration:none;font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);background:rgba(88,166,255,0.1);white-space:nowrap;">地区管理</a>
      <a data-dom-id="nav-cfnat" href="#" style="padding:8px 16px;border-radius:var(--cfnat-radius-md);color:var(--cfnat-muted-foreground);text-decoration:none;font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);transition:color 0.15s,background 0.15s;white-space:nowrap;">cfnat 配置</a>

  <!-- ====== 主内容区 ====== -->
  <main style="max-width:1400px;margin:0 auto;padding:24px;">

    <!-- 页面标题 -->
    <div style="margin-bottom:20px;">
      <h1 style="font-size:var(--font-size-xl);font-weight:var(--font-weight-bold);color:var(--cfnat-foreground);margin:0 0 4px 0;">地区管理</h1>
      <p style="font-size:var(--font-size-sm);color:var(--cfnat-muted-foreground);margin:0;">管理代理地区节点，配置 Colo 代码与监听端口</p>
    </div>

    <!-- ========== 添加地区卡片 ========== -->
    <div style="background:var(--cfnat-card);border:1px solid var(--cfnat-border);border-radius:var(--cfnat-radius-lg);margin-bottom:24px;overflow:hidden;">
      <!-- 卡片标题 -->
      <div style="padding:16px 24px;border-bottom:1px solid var(--cfnat-border);display:flex;align-items:center;gap:10px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--cfnat-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        <span style="font-size:var(--font-size-lg);font-weight:var(--font-weight-bold);color:var(--cfnat-foreground);">添加地区</span>
      </div>
      <!-- 卡片内容 -->
      <div style="padding:20px 24px;">
        <div style="display:grid;grid-template-columns:1fr 1fr 160px auto auto;gap:16px;align-items:end;">
          <!-- 名称 -->
          <div>
            <label style="display:block;font-size:var(--font-size-xs);color:var(--cfnat-muted-foreground);margin-bottom:6px;font-weight:var(--font-weight-medium);">名称</label>
            <input type="text" class="form-input" placeholder="HKG / LAX / JP" />
          </div>
          <!-- Colo 代码 -->
          <div>
            <label style="display:block;font-size:var(--font-size-xs);color:var(--cfnat-muted-foreground);margin-bottom:6px;font-weight:var(--font-weight-medium);">Colo 代码</label>
            <input type="text" class="form-input mono" placeholder="KIX,NRT,OKA" />
          </div>
          <!-- 监听端口 -->
          <div>
            <label style="display:block;font-size:var(--font-size-xs);color:var(--cfnat-muted-foreground);margin-bottom:6px;font-weight:var(--font-weight-medium);">监听端口</label>
            <input type="number" class="form-input mono" placeholder="1004" style="width:100%;" />
          </div>
          <!-- 启用 -->
          <div>
            <label style="display:block;font-size:var(--font-size-xs);color:var(--cfnat-muted-foreground);margin-bottom:6px;font-weight:var(--font-weight-medium);">&nbsp;</label>
            <label class="custom-checkbox">
              <input type="checkbox" checked />
              <span class="checkmark"></span>
              <span>启用</span>
            </label>
          </div>
          <!-- Fallback -->
          <div>
            <label style="display:block;font-size:var(--font-size-xs);color:var(--cfnat-muted-foreground);margin-bottom:6px;font-weight:var(--font-weight-medium);">&nbsp;</label>
            <label class="custom-checkbox">
              <input type="checkbox" checked />
              <span class="checkmark"></span>
              <span>Fallback</span>
            </label>
          </div>
        </div>
        <!-- 添加按钮 -->
        <div style="margin-top:20px;display:flex;justify-content:flex-end;">
          <button class="btn btn-primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            添加
          </button>
        </div>
      </div>
    </div>

    <!-- ========== 地区列表卡片 ========== -->

      <!-- 卡片标题 -->
      <div style="padding:16px 24px;border-bottom:1px solid var(--cfnat-border);display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:10px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--cfnat-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span style="font-size:var(--font-size-lg);font-weight:var(--font-weight-bold);color:var(--cfnat-foreground);">地区列表</span>
        </div>
        <span style="font-size:var(--font-size-xs);color:var(--cfnat-muted-foreground);">共 5 个地区</span>

      <!-- 表格 -->
      <div style="overflow-x:auto;">

              <th>Colo</th>

              <th style="width:80px;">IP数</th>

            </tr>
          </thead>

              <td>

                  <span class="status-dot active"></span>

                </div>
              </td>
              <td><span class="badge-colo">HKG</span></td>
              <td style="font-family:var(--font-display);color:var(--cfnat-foreground);">1004</td>
              <td><span class="badge badge-success"><span class="status-dot active" style="width:5px;height:5px;"></span>开启</span></td>
              <td><span class="badge badge-success"><span class="status-dot active" style="width:5px;height:5px;"></span>开启</span></td>
              <td style="font-family:var(--font-display);color:var(--cfnat-foreground);">128</td>
              <td style="text-align:right;padding-right:24px;">

                  <button class="btn btn-danger-ghost">删除</button>

              <td><span class="badge badge-success"><span class="status-dot active" style="width:5px;height:5px;"></span>开启</span></td>
              <td><span class="badge badge-success"><span class="status-dot active" style="width:5px;height:5px;"></span>开启</span></td>
              <td style="font-family:var(--font-display);color:var(--cfnat-foreground);">256</td>
              <td style="text-align:right;padding-right:24px;">
                <div style="display:flex;gap:8px;justify-content:flex-end;">
                  <button class="btn btn-toggle-on">停用</button>
                  <button class="btn btn-danger-ghost">删除</button>

            </tr>

              <td>
                <div style="display:flex;align-items:center;gap:8px;">
                  <span class="status-dot inactive"></span>
                  <span style="font-weight:var(--font-weight-medium);color:var(--cfnat-muted-foreground);">JP</span>
                </div>
              </td>
              <td><span class="badge-colo">KIX, NRT, OKA</span></td>
              <td style="font-family:var(--font-display);color:var(--cfnat-muted-foreground);">1006</td>
              <td><span class="badge badge-muted">关闭</span></td>
              <td><span class="badge badge-success"><span class="status-dot active" style="width:5px;height:5px;"></span>开启</span></td>
              <td style="font-family:var(--font-display);color:var(--cfnat-muted-foreground);">64</td>
              <td style="text-align:right;padding-right:24px;">
                <div style="display:flex;gap:8px;justify-content:flex-end;">
                  <button class="btn btn-toggle-off">启用</button>
                  <button class="btn btn-danger-ghost">删除</button>
                </div>
              </td>
            </tr>
            <!-- FRA -->
            <tr>
              <td>
                <div style="display:flex;align-items:center;gap:8px;">
                  <span class="status-dot active"></span>
                  <span style="font-weight:var(--font-weight-medium);color:var(--cfnat-foreground);">FRA</span>
                </div>
              </td>
              <td><span class="badge-colo">FRA</span></td>
              <td style="font-family:var(--font-display);color:var(--cfnat-foreground);">1007</td>
              <td><span class="badge badge-success"><span class="status-dot active" style="width:5px;height:5px;"></span>开启</span></td>
              <td><span class="badge badge-muted">关闭</span></td>
              <td style="font-family:var(--font-display);color:var(--cfnat-foreground);">96</td>
              <td style="text-align:right;padding-right:24px;">
                <div style="display:flex;gap:8px;justify-content:flex-end;">
                  <button class="btn btn-toggle-on">停用</button>
                  <button class="btn btn-danger-ghost">删除</button>

              </td>

            <tr>
              <td>
                <div style="display:flex;align-items:center;gap:8px;">

    <style>
    /* === 基础重置 === */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-body);
      font-size: var(--font-size-base);
      background: var(--cfnat-background);
      color: var(--cfnat-foreground);
      line-height: var(--line-height-normal);
      -webkit-font-smoothing: antialiased;
    }

    /* === 表单输入 === */
    .form-input {
      padding: 8px 14px;
      background: var(--cfnat-input);
      border: 1px solid var(--cfnat-border);
      border-radius: var(--cfnat-radius-md);
      color: var(--cfnat-foreground);
      font-family: var(--font-body);
      font-size: var(--font-size-sm);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      width: 100%;
    }
    .form-input::placeholder {
      color: var(--cfnat-muted-foreground);
    }
    .form-input:focus {
      border-color: var(--cfnat-primary);
      box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.15);
    }
    .form-input.mono {
      font-family: var(--font-display);
    }

    /* === 自定义复选框 === */
    .custom-checkbox {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      font-size: var(--font-size-sm);
      color: var(--cfnat-card-foreground);
    }
    .custom-checkbox input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }
    .checkmark {
      width: 18px;
      height: 18px;
      background: var(--cfnat-input);
      border: 1px solid var(--cfnat-border);
      border-radius: var(--cfnat-radius-sm);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .custom-checkbox input:checked + .checkmark {
      background: var(--cfnat-primary);
      border-color: var(--cfnat-primary);
    }
    .custom-checkbox input:checked + .checkmark::after {
      content: '';
      display: block;
      width: 5px;
      height: 9px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg) translate(-0.5px, -0.5px);
    }

    /* === 数据表格 === */
    .data-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: var(--font-size-sm);
    }
    .data-table thead th {
      padding: 12px 16px;
      text-align: left;
      font-weight: var(--font-weight-medium);
      color: var(--cfnat-muted-foreground);
      font-size: var(--font-size-xs);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      border-bottom: 1px solid var(--cfnat-border);
      background: var(--cfnat-card);
      position: sticky;
      top: 0;
    }
    .data-table tbody tr {
      transition: background 0.12s;
    }
    .data-table tbody tr:nth-child(even) {
      background: rgba(255, 255, 255, 0.015);
    }
    .data-table tbody tr:hover {
      background: rgba(88, 166, 255, 0.05);
    }
    .data-table tbody td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--cfnat-border);
      color: var(--cfnat-card-foreground);
      vertical-align: middle;
    }

    /* === 状态标签 === */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: var(--cfnat-radius-full);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      white-space: nowrap;
    }
    .badge-success {
      background: rgba(63, 185, 80, 0.12);
      color: var(--state-success);
    }
    .badge-muted {
      background: rgba(110, 118, 129, 0.15);
      color: var(--cfnat-muted-foreground);
    }
    .badge-colo {
      background: rgba(88, 166, 255, 0.1);
      color: var(--cfnat-primary);
      font-family: var(--font-display);
      font-size: var(--font-size-xs);
      padding: 2px 8px;
      border-radius: var(--cfnat-radius-sm);
      border: 1px solid rgba(88, 166, 255, 0.2);
    }

    /* === 按钮样式 === */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 18px;
      border: none;
      border-radius: var(--cfnat-radius-md);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      font-family: var(--font-body);
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active {
      transform: scale(0.97);
    }
    .btn-primary {
      background: var(--cfnat-primary);
      color: var(--cfnat-primary-foreground);
    }
    .btn-primary:hover {
      background: var(--cfnat-primary-hover);
    }
    .btn-danger-ghost {
      background: transparent;
      color: var(--cfnat-muted-foreground);
      border: 1px solid var(--cfnat-border);
      padding: 5px 12px;
      font-size: var(--font-size-xs);
    }
    .btn-danger-ghost:hover {
      background: rgba(248, 81, 73, 0.1);
      border-color: rgba(248, 81, 73, 0.4);
      color: var(--state-error);
    }
    .btn-toggle-on {
      background: rgba(63, 185, 80, 0.1);
      color: var(--state-success);
      border: 1px solid rgba(63, 185, 80, 0.25);
      padding: 5px 12px;
      font-size: var(--font-size-xs);
    }
    .btn-toggle-on:hover {
      background: rgba(63, 185, 80, 0.18);
    }
    .btn-toggle-off {
      background: rgba(110, 118, 129, 0.1);
      color: var(--cfnat-muted-foreground);
      border: 1px solid var(--cfnat-border);
      padding: 5px 12px;
      font-size: var(--font-size-xs);
    }
    .btn-toggle-off:hover {
      background: rgba(110, 118, 129, 0.18);
    }

    /* === 状态指示点 === */
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .status-dot.active {
      background: var(--state-success);
      box-shadow: 0 0 6px rgba(63, 185, 80, 0.5);
    }
    .status-dot.inactive {
      background: var(--cfnat-muted-foreground);
    }
  </style>
</body>
</html>
