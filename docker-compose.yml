services:
  cfnat-aio:
    image: alpine:3.22
    container_name: cfnat-aio
    restart: unless-stopped
    ports:
      - "1234:1234"   # WebUI
      - "2001:1001"   # 香港 proxy（本地 1001 被 System 占用）
      - "2002:1002"   # 美国 proxy
      - "2003:1003"   # 日本 proxy
      - "2004:1004"   # 新加坡 proxy
      - "2005:1005"   # 越南 proxy
    volumes:
      - ./data:/data:rw
    environment:
      - TZ=Asia/Shanghai
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=*
      - no_proxy=*
    entrypoint: ["/data/cfnat-aio"]
    command: ["-port", "1234"]
